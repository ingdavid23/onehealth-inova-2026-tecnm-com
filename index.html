    <style>
        :root {
            --color-bg: #0B1120;
            --color-surface: #151D33;
            --color-text: #E2E8F0;
            --color-primary: #22D3EE;
            --color-secondary: #6366F1;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; box-sizing: border-box; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
        .glass { background: rgba(21, 29, 51, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(34, 211, 238, 0.08); }
        .glow { box-shadow: 0 0 30px rgba(34, 211, 238, 0.1); }
        .glow-sm { box-shadow: 0 0 15px rgba(34, 211, 238, 0.08); }
        .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideToast { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
        .toast { animation: slideToast 0.4s ease-out forwards; }

        .sidebar-link { transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(34, 211, 238, 0.08); border-left-color: var(--color-primary); color: var(--color-primary); }

        input, select, textarea { background: rgba(11, 17, 32, 0.6) !important; border: 1px solid rgba(34, 211, 238, 0.15) !important; color: var(--color-text) !important; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--color-primary) !important; outline: none; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 3px; }

        .btn-primary { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3); }
        .btn-danger { background: linear-gradient(135deg, #EF4444, #DC2626); }
        .btn-danger:hover { box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3); }

        .stat-card { background: linear-gradient(135deg, rgba(21, 29, 51, 0.9), rgba(21, 29, 51, 0.7)); border: 1px solid rgba(34, 211, 238, 0.1); }
        .status-pending { color: #FBBF24; background: rgba(251, 191, 36, 0.1); }
        .status-confirmed { color: #22D3EE; background: rgba(34, 211, 238, 0.1); }
        .status-completed { color: #34D399; background: rgba(52, 211, 153, 0.1); }
        .status-cancelled { color: #F87171; background: rgba(248, 113, 113, 0.1); }

        .chat-bubble-sent { background: linear-gradient(135deg, var(--color-secondary), #4F46E5); border-radius: 18px 18px 4px 18px; }
        .chat-bubble-received { background: rgba(21, 29, 51, 0.9); border: 1px solid rgba(34, 211, 238, 0.1); border-radius: 18px 18px 18px 4px; }
        .modal-backdrop { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }

        /* === ESTILOS PARA FULLCALENDAR (MODO OSCURO MEDICONSULT) === */
        .fc { font-family: 'Plus Jakarta Sans', sans-serif !important; }

        /* --- Cuadrícula y Fondo (Integración con el Dashboard Oscuro) --- */
        .fc-theme-standard th, .fc-theme-standard td, .fc-theme-standard .fc-scrollgrid {
            border-color: rgba(34, 211, 238, 0.08) !important; /* Bordes muy suaves en cian */
        }
        .fc-dayGridMonth-view {
            background-color: var(--color-surface) !important; /* Fondo oscuro #151D33 */
            border-radius: 16px;
            overflow: hidden;
        }

        /* --- Toolbar (Encabezado) y Títulos --- */
        .fc .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 700 !important; color: var(--color-text); }
        .fc-col-header-cell-cushion, 
        .fc-daygrid-day-number, 
        .fc-timegrid-slot-label-cushion {
            color: #94a3b8 !important; /* Texto gris claro de sistema */
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* --- Botones Redondeados (Estilo Dashboard) --- */
        .fc .fc-button-primary {
            background-color: rgba(34, 211, 238, 0.05) !important; /* Fondo cian muy tenue */
            color: #94a3b8 !important;
            border: 1px solid rgba(34, 211, 238, 0.15) !important;
            border-radius: 12px !important; /* Bordes redondeados de sistema */
            text-transform: capitalize;
            font-weight: 600;
            padding: 6px 16px;
            font-size: 0.75rem;
        }

        /* Botón al pasar el ratón (Hover) y Activo */
        .fc .fc-button-primary:not(:disabled):hover,
        .fc .fc-button-primary:not(:disabled).fc-button-active {
            background-color: rgba(34, 211, 238, 0.1) !important;
            color: var(--color-primary) !important; /* Texto cian */
            border-color: rgba(34, 211, 238, 0.3) !important;
        }

        /* --- Burbujas de Eventos (Bloques con Info y Colores de Sistema) --- */
        .fc-event {
            cursor: pointer;
            border: none !important;
            padding: 3px 6px;
            border-radius: 6px;
            color: white !important; /* Texto siempre blanco */
            font-weight: 600;
            font-size: 0.7rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            margin: 1px 0;
        }
        /* Los colores específicos (Cian/Añil) se asignan en el JS */

        /* --- Resaltar el día de Hoy (Como en la imagen 0) --- */
        .fc-daygrid-day.fc-day-today {
            background-color: rgba(34, 211, 238, 0.03) !important; /* Resaltado cian casi invisible */
        }
        /* Quitar el círculo azul de GCal en el número de día de hoy */
        .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
            background-color: transparent;
            color: var(--color-primary) !important; /* El número de día se vuelve cian */
            font-weight: 800;
            border-radius: 0;
            width: auto;
            height: auto;
            display: inline-block;
        }

        /* --- Vistas de Lista y Hora --- */
        .fc-list-event:hover td { background-color: rgba(34, 211, 238, 0.05) !important; }
        .fc-timegrid-now-indicator-line { border-color: var(--color-primary) !important; } /* Indicador cian */
    </style>
</head>

      // Importar funciones de Firebase (Version 10+)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDSZYsJu7SCXZX10WkjtQF72ZZX_9C17Fs",
    authDomain: "medicina-30066.firebaseapp.com",
    projectId: "medicina-30066",
    storageBucket: "medicina-30066.firebasestorage.app",
    messagingSenderId: "683824413704",
    appId: "1:683824413704:web:0c4ada6bae3f28a56da5bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ========== STATE ==========

// Variable para recordar qué vista prefiere el usuario
window.isAppointmentListView = false;

// Función para alternar entre el Calendario y la Lista
window.toggleAppointmentView = function() {
    window.isAppointmentListView = !window.isAppointmentListView;
    window.renderCurrentPage(); // Recargamos la pantalla para aplicar el cambio
};


let currentUser = null;
let currentPage = 'dashboard';
let allData = []; 
let isDark = true;
let sidebarOpen = false;

const DEFAULT_USERS = {
    'admin': { email: 'admin@mediconnect.com', role: 'admin', name: 'Administrador', specialty: '' },
    'doctor': { email: 'doctor@mediconnect.com', role: 'doctor', name: 'Dr. Carlos Mendoza', specialty: 'Medicina General' },
    'usuario': { email: 'usuario@mediconnect.com', role: 'patient', name: 'María García', specialty: '' }
};

const SPECIALTIES = ['Medicina General', 'Cardiología', 'Dermatología', 'Pediatría', 'Neurología', 'Traumatología', 'Ginecología', 'Oftalmología'];
const SAMPLE_DOCTORS = [
    { id: 'doctor', name: 'Dr. Carlos Mendoza', specialty: 'Medicina General', rating: 4.8, available: true },
    { id: 'doc2', name: 'Dra. Ana López', specialty: 'Cardiología', rating: 4.9, available: true },
];

// ========== CORE UI HELPERS ==========
window.showToast = function(msg, type = 'success') {
    const ct = document.getElementById('toast-container');
    const t = document.createElement('div');
    const colors = { success: 'from-emerald-500 to-emerald-600', error: 'from-red-500 to-red-600', info: 'from-cyan-500 to-indigo-500' };
    const icons = { success: 'check-circle', error: 'alert-circle', info: 'info' };
    t.className = 'toast flex items-center gap-2 px-4 py-3 rounded-xl text-white text-sm font-medium bg-gradient-to-r ' + (colors[type] || colors.info);
    t.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4 flex-shrink-0"></i><span>${msg}</span>`;
    ct.appendChild(t);
    lucide.createIcons({ nodes: [t] });
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}



window.openModal = function(html) {
    const modalContent = document.getElementById('modal-content');
    
    // Le agregamos 'relative' para que la X se posicione correctamente en la esquina
    modalContent.classList.add('relative'); 
    
    // Inyectamos el botón de la X flotante junto con el contenido de la ventana
    const closeButtonHtml = `
        <button onclick="window.closeModal()" class="absolute top-4 right-4 p-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 hover:text-red-400 transition-all z-50">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    `;
    
    modalContent.innerHTML = closeButtonHtml + html;
    document.getElementById('modal-container').classList.remove('hidden');
    lucide.createIcons({ nodes: [modalContent] });
}
window.closeModal = function() { 
    // Si estábamos a la mitad de arrastrar una cita en el calendario y cerramos, cancelamos el movimiento
    if (window.currentDropInfo) {
        window.currentDropInfo.revert();
        window.currentDropInfo = null;
    }
    document.getElementById('modal-container').classList.add('hidden'); 
}

// Funciones globales para manejar el "Arrastrar y Soltar" en el calendario
window.currentDropInfo = null;

window.confirmEventDrop = function() {
    if (!window.currentDropInfo) return;
    const info = window.currentDropInfo;
    const newDate = info.event.start.toISOString().split('T')[0];
    const newTime = info.event.start.toTimeString().slice(0, 5);
    
    window.updateFirestoreRecord('appointments', info.event.id, { 
        date: newDate, 
        time: newTime, 
        status: 'pending' 
    });
    
    window.currentDropInfo = null; // Limpiamos la variable
    window.closeModal();
};

window.cancelEventDrop = function() {
    window.closeModal(); // La nueva lógica de closeModal ya hace el info.revert() automáticamente
};
window.toggleTheme = function() {
    isDark = !isDark;
    document.documentElement.style.setProperty('--color-bg', isDark ? '#0B1120' : '#F1F5F9');
    document.documentElement.style.setProperty('--color-surface', isDark ? '#151D33' : '#FFFFFF');
    document.documentElement.style.setProperty('--color-text', isDark ? '#E2E8F0' : '#1E293B');
    window.renderCurrentPage();
}

function getDataByType(type) { return allData.filter(d => d.type === type); }
function formatDate(d) { return new Date(d).toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' }); }

// ========== FIRESTORE DATA SYNC ==========
function setupRealtimeListeners() {
    const collections = ['appointments', 'records', 'prescriptions', 'messages', 'health_profiles', 'notes', 'users'];
    collections.forEach(colName => {
        onSnapshot(collection(db, colName), (snapshot) => {
            let mappedType = colName;
            // Estandarizamos para que 'prescriptions' siempre se lea como 'prescription'
            if (colName === 'prescriptions') mappedType = 'prescription';
            else if (colName === 'appointments') mappedType = 'appointment';
            else if (colName === 'health_profiles') mappedType = 'health_profile';
            else if (colName.endsWith('s') && colName !== 'users') mappedType = colName.slice(0, -1);
            else if (colName === 'users') mappedType = 'user';
            
            // ... resto del código igual
            
            const newData = snapshot.docs.map(doc => ({ __backendId: doc.id, type: mappedType, ...doc.data() }));
            allData = allData.filter(d => d.type !== mappedType).concat(newData);
            
            if (currentUser) {
                window.renderCurrentPage();
                window.updateNotifBadge();
            }
        });
    });
}
window.createFirestoreRecord = async function(collectionName, dataObj) {
    try { await addDoc(collection(db, collectionName), dataObj); window.showToast('Guardado correctamente'); window.closeModal(); } 
    catch(e) { window.showToast('Error al guardar', 'error'); }
}
window.updateFirestoreRecord = async function(collectionName, id, newData) {
    try { await updateDoc(doc(db, collectionName, id), newData); window.showToast('Actualizado correctamente'); } 
    catch(e) { window.showToast('Error al actualizar', 'error'); }
}
window.deleteFirestoreRecord = async function(collectionName, id) {
    try { await deleteDoc(doc(db, collectionName, id)); window.showToast('Eliminado exitosamente'); } 
    catch(e) { window.showToast('Error al eliminar', 'error'); }
}

// ========== AUTHENTICATION ==========
window.quickLogin = function(u, p) {
    document.getElementById('login-user').value = u;
    document.getElementById('login-pass').value = p;
    window.handleLogin();
}

window.handleLogin = async function() {
    const userOrEmail = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const err = document.getElementById('login-error');
    if (!userOrEmail || !pass) { err.textContent = 'Completa todos los campos'; err.classList.remove('hidden'); return; }
    
    const loginInfo = DEFAULT_USERS[userOrEmail];
    const emailToUse = loginInfo ? loginInfo.email : userOrEmail;

    try {
        await signInWithEmailAndPassword(auth, emailToUse, pass);
    } catch (error) {
        if ((error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') && loginInfo) {
            try {
                const userCred = await createUserWithEmailAndPassword(auth, emailToUse, pass);
                await setDoc(doc(db, 'users', userCred.user.uid), { username: userOrEmail, name: loginInfo.name, role: loginInfo.role, specialty: loginInfo.specialty });
            } catch (e) { err.textContent = 'Error creando cuenta.'; err.classList.remove('hidden'); return; }
        } else { err.textContent = 'Credenciales incorrectas'; err.classList.remove('hidden'); return; }
    }

    onSnapshot(doc(db, 'users', auth.currentUser.uid), (docSnap) => {
        currentUser = docSnap.exists() ? { uid: auth.currentUser.uid, ...docSnap.data() } : { uid: auth.currentUser.uid, username: userOrEmail, ...loginInfo };
        err.classList.add('hidden');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        setupApp();
        window.showToast(`Bienvenido, ${currentUser.name}`, 'success');
        setupRealtimeListeners();
    });
}

// ========== RECUPERACIÓN DE CONTRASEÑA ==========
window.handleForgotPassword = async function() {
    // Tomamos el valor que el usuario haya escrito en el campo "Usuario/Correo"
    let emailToUse = document.getElementById('login-user').value.trim();
    
    // Si no escribió nada o no es un correo válido, le abrimos un cuadro de diálogo para pedirlo
    if (!emailToUse || !emailToUse.includes('@')) {
        emailToUse = prompt("Por favor, ingresa tu correo electrónico registrado para recuperar tu contraseña:");
    }
    
    // Si cancela el prompt o lo deja vacío, detenemos la función
    if (!emailToUse) return; 

    try {
        // Enviar el correo usando Firebase
        await sendPasswordResetEmail(auth, emailToUse);
        
        // Mostrar mensaje de éxito
        window.showToast('Correo enviado. Revisa tu bandeja de entrada o spam para restablecer tu contraseña.', 'success');
        
    } catch (error) {
        // Manejo de errores amigable
        if (error.code === 'auth/user-not-found') {
            window.showToast('No hay ninguna cuenta registrada con este correo.', 'error');
        } else if (error.code === 'auth/invalid-email') {
            window.showToast('El formato del correo es inválido.', 'error');
        } else {
            window.showToast('Error al enviar el correo: ' + error.message, 'error');
        }
    }
};

window.togglePasswordVisibility = function(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (input.type === 'password') {
        input.type = 'text'; // Mostramos el texto
        icon.setAttribute('data-lucide', 'eye-off'); // Cambiamos al ojito tachado
    } else {
        input.type = 'password'; // Ocultamos el texto
        icon.setAttribute('data-lucide', 'eye'); // Cambiamos al ojito normal
    }
    
    // Forzamos a Lucide a redibujar el ícono nuevo
    lucide.createIcons({ nodes: [icon.parentElement] });
};

function statCard(icon, label, value, color = 'cyan') {

        badge.classList.add('animate-pulse');

        badge.classList.add('hidden'); 
        badge.classList.remove('animate-pulse');
    }
}

window.downloadPrescription = function(id) {
    const rx = allData.find(d => d.__backendId === id);
    if (!rx) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const patientName = rx.patient_id || "Paciente";

    // --- CONFIGURACIÓN DE ESTILO ---
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.setTextColor(14, 165, 233); // Color Cyan del logo
    doc.text("MediConnect Pro", 20, 20);

    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.setFont("helvetica", "normal");
    doc.text("Sistema de Gestión Médica Digital", 20, 26);
    doc.text(`Folio: ${rx.folio || 'N/A'}`, 150, 20);
    doc.text(`Fecha: ${formatDate(rx.created_at)}`, 150, 26);

    doc.setDrawColor(14, 165, 233);
    doc.line(20, 32, 190, 32); // Línea divisoria

    // --- DATOS DEL DOCTOR ---
    doc.setFontSize(12);
    doc.setTextColor(0);
    doc.setFont("helvetica", "bold");
    doc.text(rx.doctor_id || "Dr. Medico", 20, 45);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`Especialidad: ${rx.specialty || 'General'}`, 20, 50);
    doc.text(`Cédula: ${rx.license || 'En trámite'}`, 20, 55);
    doc.text(`Dirección: ${rx.address || 'Consultorio Central'}`, 20, 60);

    // --- DATOS DEL PACIENTE ---
    doc.setFillColor(241, 245, 249);
    doc.rect(20, 70, 170, 15, 'F');
    doc.setFont("helvetica", "bold");
    doc.text(`PACIENTE: ${patientName}`, 25, 80);
    doc.text(`EDAD: ${rx.age || '--'} años`, 100, 80);
    doc.text(`PESO: ${rx.weight || '--'} kg`, 150, 80);

    // --- MEDICAMENTOS ---
    doc.setFontSize(14);
    doc.setTextColor(14, 165, 233);
    doc.text("Prescripción", 20, 100);
    
    let yPos = 110;
    doc.setTextColor(0);
    doc.setFontSize(11);

    if (rx.medications && Array.isArray(rx.medications)) {
        rx.medications.forEach((med, index) => {
            doc.setFont("helvetica", "bold");
            doc.text(`${index + 1}. ${med.name}`, 20, yPos);
            doc.setFont("helvetica", "normal");
            doc.text(`${med.frequency} - ${med.duration}`, 25, yPos + 5);
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text(`Indicación: ${med.instruction || 'Ninguna'}`, 25, yPos + 10);
            doc.setFontSize(11);
            doc.setTextColor(0);
            yPos += 20;
        });
    } else {
        doc.text(rx.prescription || "No hay medicamentos registrados", 20, yPos);
        yPos += 20;
    }

    // --- NOTAS ---
    if (rx.notes) {
        doc.setFont("helvetica", "bold");
        doc.text("Notas e Indicaciones Generales:", 20, yPos + 5);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        const splitNotes = doc.splitTextToSize(rx.notes, 160);
        doc.text(splitNotes, 20, yPos + 12);
    }

    // --- FIRMA ---
    doc.setDrawColor(0);
    doc.line(70, 260, 140, 260);
    doc.setFont("helvetica", "bold");
    doc.text("Firma del Médico", 105, 265, { align: "center" });

    // DESCARGA INMEDIATA
    doc.save(`Receta_${patientName.replace(/\s+/g, '_')}.pdf`);
};

window.createPrescription = function() {
    const selectedVal = document.getElementById('rx-patient').value;
    const customVal = document.getElementById('rx-patient-custom').value.trim();
    const patientName = (selectedVal === 'Otro') ? customVal : selectedVal;

    if (!patientName) return window.showToast('Seleccione un paciente', 'error');

    // Recolectar todos los medicamentos
    const medElements = document.querySelectorAll('.med-item');
    const medications = Array.from(medElements).map(el => ({
        name: el.querySelector('.med-name').value,
        frequency: el.querySelector('.med-freq').value,
        duration: el.querySelector('.med-dur').value,
        instruction: el.querySelector('.med-inst').value
    })).filter(m => m.name !== "");

    if (medications.length === 0) return window.showToast('Agregue al menos un medicamento', 'error');

    window.createFirestoreRecord('prescriptions', {
        patient_id: patientName, // Este nombre debe ser igual al que tiene el paciente en su perfil
        age: document.getElementById('rx-age').value,
        weight: document.getElementById('rx-weight').value || "N/A",
        medications: medications,
        notes: document.getElementById('rx-notes').value || "Sin observaciones adicionales.",
        doctor_id: currentUser.name, // Usamos el nombre completo del doctor para el PDF
        specialty: currentUser.specialty || "Medicina General",
        license: currentUser.license || "---",
        phone: currentUser.phone || "---",
        address: currentUser.address || "Consultorio Médico",
        folio: "RX-" + Math.floor(Math.random() * 900000 + 100000),
        created_at: new Date().toISOString()
    });

    // Forzar recarga de la página actual para que aparezca en el historial inmediatamente
    setTimeout(() => { window.renderCurrentPage(); }, 500);
};

// Función mágica que filtra los doctores
window.filterDoctorsBySpecialty = function() {
    const specialty = document.getElementById('appt-specialty').value;
    const doctorSelect = document.getElementById('appt-doctor');
    
    if (!specialty) {
        doctorSelect.innerHTML = '<option value="">Esperando especialidad...</option>';
        doctorSelect.disabled = true;
        doctorSelect.classList.add('bg-black/20');
        return;
    }

    // Buscamos doctores que tengan la especialidad seleccionada
    const availableDoctors = getDataByType('user').filter(u => u.role === 'doctor' && u.specialty === specialty);
    
    if (availableDoctors.length === 0) {
        doctorSelect.innerHTML = '<option value="">No hay doctores en esta área aún</option>';
        doctorSelect.disabled = true;
        doctorSelect.classList.add('bg-black/20');
    } else {
        doctorSelect.innerHTML = '<option value="">Selecciona a tu médico...</option>' + 
            availableDoctors.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
        doctorSelect.disabled = false;
        doctorSelect.classList.remove('bg-black/20');
    }
}

window.createAppointment = function() {
    const patient = document.getElementById('appt-patient').value;
    const specialty = document.getElementById('appt-specialty').value;
    const doctor = document.getElementById('appt-doctor').value;
    const date = document.getElementById('appt-date').value;
    const time = document.getElementById('appt-time').value;
    
    if (!patient || !specialty || !doctor || !date) {
        return window.showToast('Por favor completa todos los pasos', 'error');
    }
    
    window.createFirestoreRecord('appointments', { 
        patient_id: patient, 
        doctor_id: doctor, 
        specialty: specialty, // Guardamos la especialidad en la cita
        date: date, 
        time: time, 
        status: 'pending', 
        created_at: new Date().toISOString() 
    });
}

window.currentChatPartner = null;


function renderChat(el) {
    // 1. Los administradores no pueden leer chats por privacidad
    if (currentUser.role === 'admin') {
        el.innerHTML = `<div class="glass rounded-2xl p-8 text-center mt-10 max-w-md mx-auto fade-in glow-sm">
            <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center mx-auto mb-4 border border-slate-700">
                <i data-lucide="shield-alert" class="w-8 h-8 text-slate-400"></i>
            </div>
            <h3 class="text-lg font-bold text-med-text mb-2">Acceso Restringido</h3>
            <p class="text-sm text-slate-400">Por privacidad médica, los administradores no tienen acceso a los chats.</p>
        </div>`;
        return;
    }

    const isDoctor = currentUser.role === 'doctor';
    const myName = String(currentUser.name || "").toLowerCase().trim();
    const myUsername = String(currentUser.username || "").toLowerCase().trim();
    
    const allMessages = getDataByType('message');
    const allUsers = getDataByType('user');
    
    // VISTA 1: LISTA DE CHATS (Estilo WhatsApp)
    if (!window.currentChatPartner) {
        let contactsMap = new Map();

        // A) Cargar contactos sugeridos según el rol opuesto
        const oppositeRole = isDoctor ? 'patient' : 'doctor';
        const availableContacts = allUsers.filter(u => u.role === oppositeRole);
        
        availableContacts.forEach(user => {
            const contactName = user.name || user.username;
            if (contactName) {
                contactsMap.set(contactName.toLowerCase().trim(), { 
                    displayName: contactName, 
                    lastMsg: 'Toca para iniciar chat', 
                    time: '1970-01-01T00:00:00.000Z', 
                    unread: 0
                });
            }
        });

       // B) Sobrescribimos con el historial de mensajes reales
       allMessages.forEach(m => {
            const sender = String(m.sender || "").toLowerCase().trim();
            const receiver = String(m.receiver || "").toLowerCase().trim();
            
            let partnerKey = null;
            let partnerDisplayName = "";

            if (sender === myName || sender === myUsername) {
                partnerKey = receiver;
                partnerDisplayName = m.receiver; // Guardamos el nombre tal cual viene
            } else if (receiver === myName || receiver === myUsername) {
                partnerKey = sender;
                partnerDisplayName = m.sender;
            }

            if (partnerKey && partnerKey !== myName && partnerKey !== myUsername) {
                const isUnread = (receiver === myName || receiver === myUsername) && !m.read;
                const messageText = m.deleted ? "🚫 Mensaje eliminado" : (m.image ? "📷 Foto" : m.message);
                
                if (!contactsMap.has(partnerKey)) {
                    contactsMap.set(partnerKey, { 
                        displayName: partnerDisplayName, 
                        lastMsg: messageText, 
                        time: m.created_at, 
                        unread: isUnread ? 1 : 0 
                    });
                } else {
                    let contact = contactsMap.get(partnerKey);
                    // CRUCIAL: Solo actualizamos si el mensaje es cronológicamente más reciente
                    if (new Date(m.created_at) > new Date(contact.time)) {
                        contact.lastMsg = messageText;
                        contact.time = m.created_at;
                        contact.displayName = partnerDisplayName; // Mantenemos el nombre más fresco
                    }
                    if (isUnread) contact.unread += 1;
                    contactsMap.set(partnerKey, contact);
                }
            }
        });

        // C) ORDENAMIENTO CRÍTICO: El chat con el mensaje más reciente (time) va arriba.
        let contacts = Array.from(contactsMap.values()).sort((a, b) => {
            return new Date(b.time) - new Date(a.time);
        });

        el.innerHTML = `
        <div class="glass rounded-2xl overflow-hidden fade-in h-full flex flex-col border border-white/5">
            <div class="p-5 border-b border-white/5 bg-[#202c33] flex justify-between items-center">
                <h3 class="font-bold text-lg text-white flex items-center gap-2">
                    <i data-lucide="message-circle" class="w-5 h-5 text-emerald-500"></i> Chats
                </h3>
            </div>
            <div class="divide-y divide-white/5 overflow-y-auto flex-1 custom-scrollbar bg-[#111b21]">
                ${contacts.length === 0 ? 
                    `<div class="p-10 text-center"><i data-lucide="message-square-off" class="w-10 h-10 text-slate-600 mx-auto mb-3"></i><p class="text-slate-400 text-sm">No hay contactos disponibles.</p></div>` :
                contacts.map(c => `
                    <div class="flex items-center justify-between p-4 hover:bg-white/5 transition-all cursor-pointer group" onclick="window.openChatWith('${c.displayName}')">
                        <div class="flex items-center gap-4 w-full">
                            <div class="relative w-12 h-12 rounded-full bg-gradient-to-br ${isDoctor ? 'from-emerald-400 to-emerald-600' : 'from-indigo-400 to-indigo-600'} flex items-center justify-center text-white font-bold shadow-lg flex-shrink-0">
                                ${c.displayName.charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <p class="font-bold text-sm text-white truncate">${c.displayName}</p>
                                    ${c.time !== '1970-01-01T00:00:00.000Z' ? `<p class="text-[10px] text-emerald-500">${new Date(c.time).toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'})}</p>` : ''}
                                </div>
                                <div class="flex justify-between items-center">
                                    <p class="text-xs ${c.unread > 0 ? 'text-white font-medium' : 'text-slate-400'} truncate pr-4">${c.lastMsg}</p>
                                    ${c.unread > 0 ? `<span class="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center text-[10px] font-bold text-[#111b21] flex-shrink-0 animate-pulse">${c.unread}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
        lucide.createIcons({ nodes: [el] });
        return;
    }

    // VISTA 2: CHAT PRIVADO
    const partner = window.currentChatPartner;
    const partnerClean = partner.toLowerCase().trim();
    
    // Marcar como leídos
    allMessages.filter(m => 
        String(m.sender).toLowerCase().trim() === partnerClean && 
        (String(m.receiver).toLowerCase().trim() === myName || String(m.receiver).toLowerCase().trim() === myUsername) && 
        !m.read
    ).forEach(m => window.updateFirestoreRecord('messages', m.__backendId, { read: true }));

    // Filtrar mensajes de la conversación
    const chatMessages = allMessages.filter(m => {
        const mSender = String(m.sender || "").toLowerCase().trim();
        const mReceiver = String(m.receiver || "").toLowerCase().trim();
        
        const iSent = (mSender === myName || mSender === myUsername) && mReceiver === partnerClean;
        const iReceived = mSender === partnerClean && (mReceiver === myName || mReceiver === myUsername);
        
        return iSent || iReceived;

            <button onclick="window.startVideoCall()" class="w-10 h-10 rounded-full bg-[#00a884]/20 hover:bg-[#00a884]/40 flex items-center justify-center text-[#00a884] transition-all shadow-sm" title="Iniciar Videoconsulta">

            <div class="relative z-10 flex flex-col space-y-3">
                ${chatMessages.length === 0 ? 
                    '<div class="text-center bg-[#182229] p-3 rounded-xl mx-auto mt-4 border border-white/5 shadow-md"><p class="text-xs text-[#8696a0]">No hay mensajes previos.</p></div>' :
                    chatMessages.map(m => {
                        const mSender = String(m.sender || "").toLowerCase().trim();
                        const isMine = mSender === myName || mSender === myUsername;
                        
                        return `<div class="flex ${isMine ? 'justify-end' : 'justify-start'} fade-in mb-2">

window.sendMessage = function() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if(!msg || !window.currentChatPartner) return;
    
    // IMPORTANTE: Usamos currentUser.name para que coincida con el catálogo
    const myName = currentUser.name; 

    window.createFirestoreRecord('messages', { 
        sender: myName, 
        receiver: window.currentChatPartner, 
        message: msg, 
        read: false,
        created_at: new Date().toISOString() 
    });
    
    input.value = '';
    // No hace falta renderizar, el onSnapshot de setupRealtimeListeners lo hará solo
};

// ELIMINAR PARA TODOS
window.deleteMessageForEveryone = function(id) {
    if(confirm("¿Eliminar este mensaje para todos?")) {
        window.updateFirestoreRecord('messages', id, { 
            message: "Este mensaje fue eliminado", 
            deleted: true,
            image: null // Si tenía imagen, la borramos
        });
    }
};

// EDITAR MENSAJE
window.editMessage = function(id, currentMsg) {
    const newMsg = prompt("Edita tu mensaje:", currentMsg);
    if(newMsg && newMsg.trim() !== "" && newMsg !== currentMsg) {
        window.updateFirestoreRecord('messages', id, { 
            message: newMsg.trim(), 
            edited: true 
        });
    }
};

// ENVIAR IMAGEN (Convertir a Base64 para guardado rápido en Firestore)
window.handleChatImage = function(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            window.createFirestoreRecord('messages', { 
                sender: currentUser.name, 
                receiver: window.currentChatPartner, 
                message: "📷 Foto", 
                image: base64Image,
                read: false,
                created_at: new Date().toISOString() 
            });
        };
        reader.readAsDataURL(input.files[0]);
    }
};

// ========== SISTEMA DE TELEMEDICINA (JITSI MEET) ==========
window.startVideoCall = function() {
    if (!window.currentChatPartner) return;
    
    // 1. Limpiamos los nombres para quitar espacios o caracteres raros
    const myNameClean = String(currentUser.name || currentUser.username).replace(/[^a-zA-Z0-9]/g, '');
    const partnerClean = String(window.currentChatPartner).replace(/[^a-zA-Z0-9]/g, '');
    
    // 2. Ordenamos los nombres alfabéticamente. 
    // Esto asegura que la sala "Carlos_Maria" sea la misma que "Maria_Carlos"
    const roomName = `MediConnect_${[myNameClean, partnerClean].sort().join('_')}`;
    
    // 3. Generamos la URL segura de Jitsi
    const jitsiUrl = `https://meet.jit.si/${roomName}`;
    
    // 4. Enviamos un mensaje automático al chat para avisar a la otra persona
    const msgAviso = `🎥 He iniciado una videoconsulta. Haz clic en el ícono de la cámara de video 📹 arriba para unirte, o entra directo a este enlace copiándolo en tu navegador: ${jitsiUrl}`;
    
    window.createFirestoreRecord('messages', { 
        sender: currentUser.name, 
        receiver: window.currentChatPartner, 
        message: msgAviso, 
        read: false,
        created_at: new Date().toISOString() 
    });

    // 5. Abrimos la videollamada en una nueva pestaña
    window.open(jitsiUrl, '_blank');
    window.showToast('Conectando a la sala virtual...', 'success');
};

// ========== ACTUALIZACIÓN DE NOTIFICACIONES ==========
window.updateNotifBadge = function() {
    const myName = currentUser.name;
    const myUsername = currentUser.username;
    
    const appts = getDataByType('appointment');
    const pendingAppts = appts.filter(a => a.status === 'pending' && (currentUser.role === 'admin' || a.doctor_id === myName || a.doctor_id === myUsername)).length;
    
    const unreadMsgs = getDataByType('message').filter(m => (m.receiver === myName || m.receiver === myUsername) && !m.read).length;
    
    const totalAlerts = pendingAppts + unreadMsgs;
    const badge = document.getElementById('notif-badge');
    
    if (totalAlerts > 0) { 
        badge.textContent = totalAlerts; 
        badge.classList.remove('hidden'); 
        badge.classList.add('animate-pulse');
    } else { 
        badge.classList.add('hidden'); 
        badge.classList.remove('animate-pulse');
    }
}

window.saveNewUser = async function() {
    const role = document.getElementById('nu-role').value;
    const name = document.getElementById('nu-name').value.trim();
    const email = document.getElementById('nu-email').value.trim();
    const password = document.getElementById('nu-password').value.trim();
    
    if (!name || !email || !password) return window.showToast('Nombre, correo y contraseña son obligatorios', 'error');

    const userData = {
        role: role,
        name: name,
        email: email,
        password: password, 
        username: email.split('@')[0], 
        phone: document.getElementById('nu-phone').value.trim(),
        dob: document.getElementById('nu-dob').value,
        gender: document.getElementById('nu-gender').value,
        blood_type: document.getElementById('nu-blood').value,
        address: document.getElementById('nu-address').value.trim(),
        created_at: new Date().toISOString()
    };

    if (role === 'doctor') {
        userData.specialty = document.getElementById('nu-specialty').value.trim();
        userData.license = document.getElementById('nu-license').value.trim();
    }

    try {
        const secondaryApp = initializeApp(firebaseConfig, "AppTemp" + Date.now());
        const secondaryAuth = getAuth(secondaryApp);
        const userCred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
        await signOut(secondaryAuth);
        
        await setDoc(doc(db, 'users', userCred.user.uid), userData);
        
        window.showToast('Usuario creado exitosamente', 'success');
        window.closeModal();
    } catch(error) {
        if(error.code === 'auth/email-already-in-use') {
            // TRUCO DE RECUPERACIÓN: Si el Auth ya existe "oculto", intentamos iniciar sesión 
            // para recuperar su ID interno y volver a crear su perfil en tu tabla.
            try {
                const tempApp = initializeApp(firebaseConfig, "AppTempLogin" + Date.now());
                const tempAuth = getAuth(tempApp);
                const signInCred = await signInWithEmailAndPassword(tempAuth, email, password);
                
                // Si la contraseña es correcta, revivimos al usuario en tu base de datos
                await setDoc(doc(db, 'users', signInCred.user.uid), userData);
                await signOut(tempAuth);
                
                window.showToast('Cuenta restaurada y actualizada exitosamente', 'success');
                window.closeModal();
            } catch (loginError) {
                // Si la contraseña no es la misma que tenía originalmente en Firebase Auth
                window.showToast('Ese correo ya existe pero con otra contraseña. Bórralo manualmente en Firebase Console -> Authentication.', 'error');
            }
        } else if (error.code === 'auth/weak-password') {
            window.showToast('La contraseña debe tener al menos 6 caracteres', 'error');
        } else {
            window.showToast('Error: ' + error.message, 'error');
        }
    }
}

window.confirmDeleteUser = async function(id) {
    // 1. Encontrar al usuario que vamos a borrar en nuestra data local
    const userToDelete = allData.find(d => d.__backendId === id && d.type === 'user');
    
    if (userToDelete) {
        // Obtenemos sus identificadores (nombre y username)
        const uName = userToDelete.name;
        const uUsername = userToDelete.username;

        // 2. Filtrar todos los registros (citas, recetas, historial, notas) donde aparezca
        const relatedRecords = allData.filter(record => {
            // Buscamos si es el paciente o el doctor de ese registro
            const isPatient = record.patient_id === uName || record.patient_id === uUsername;
            const isDoctor = record.doctor_id === uName || record.doctor_id === uUsername;
            // Excluimos el registro del propio perfil de usuario para no borrarlo dos veces
            return (isPatient || isDoctor) && record.type !== 'user';
        });

        // 3. Borrar todos sus registros asociados uno por uno en Firestore
        for (const record of relatedRecords) {
            // Mapeamos el 'type' a su colección correcta en la base de datos
            let collectionName = record.type;
            if (record.type === 'health_profile') collectionName = 'health_profiles';
            else collectionName += 's'; // appointment -> appointments, prescription -> prescriptions, etc.

            try {
                await deleteDoc(doc(db, collectionName, record.__backendId));
            } catch (e) {
                console.error("No se pudo borrar el registro asociado:", e);
            }
        }
    }

    // 4. Finalmente, borramos el documento principal del perfil del usuario
    window.deleteFirestoreRecord('users', id);
    window.closeModal();
    window.showToast('Usuario y todo su historial eliminados', 'success');
}

            </div>
            
            <div class="pt-4 border-t border-white/10 mt-6">
                <button onclick="window.registerPatient()" class="w-full text-white font-bold py-3 rounded-xl text-sm shadow-lg shadow-emerald-500/20" style="background: linear-gradient(135deg, #10B981, #059669);">
                    Crear mi cuenta
                </button>
            </div>
        </form>
    </div>
    `);
}

window.registerPatient = async function() {
    const name = document.getElementById('pr-name').value.trim();
    const email = document.getElementById('pr-email').value.trim();
    const password = document.getElementById('pr-password').value;
    const phone = document.getElementById('pr-phone').value.trim();
    
    if (!name || !email || !password) {
        return window.showToast('Nombre, correo y contraseña son obligatorios', 'error');
    }

    try {
        // 1. Crear el usuario en Firebase Authentication (Como nadie ha iniciado sesión, usamos la instancia principal de auth)
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        
        // 2. Preparamos los datos del paciente
        const userData = {
            role: 'patient', // FORZAMOS EL ROL A PACIENTE
            name: name,
            email: email,
            password: password, 
            username: email.split('@')[0], 
            phone: phone,
            created_at: new Date().toISOString()
        };

        // 3. Guardamos el perfil en Firestore
        await setDoc(doc(db, 'users', userCred.user.uid), userData);
        
        window.showToast('Cuenta creada exitosamente', 'success');
        window.closeModal();
        
        // 4. Autocompletamos el login e iniciamos sesión automáticamente
        document.getElementById('login-user').value = email;
        document.getElementById('login-pass').value = password;
        window.handleLogin();

    } catch(error) {
        if(error.code === 'auth/email-already-in-use') {
            window.showToast('Este correo ya está registrado', 'error');
        } else if (error.code === 'auth/weak-password') {
            window.showToast('La contraseña debe tener al menos 6 caracteres', 'error');
        } else {
            window.showToast('Error: ' + error.message, 'error');
        }
    }
}

document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
